version: "2"
run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - ineffassign
    - misspell
    - copyloopvar
    - errorlint
    - unconvert
    - govet
    - staticcheck
    - unused
    - gocyclo
linters-settings:
  gocyclo:
    min-complexity: 15

