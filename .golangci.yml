version: "2"
run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - ineffassign
    - misspell
    - copyloopvar
    - errorlint
    - unconvert
    - govet
    - staticcheck
    - unused
    - gocyclo
  settings:
    gocyclo:
      min-complexity: 15

formatters:
  # Enable specific formatter.
  # Default: [] (uses standard Go formatting)
  enable:
    - gofmt